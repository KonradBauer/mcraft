    // Panel header / nav
    back:              '{Back}',
    nav_prev:          '{Previous}',
    nav_next:          '{Next}',
    nav_counter:       '{{i} of {total}}',
    nav_counter_empty: '—',
    // Detail header hints
    detail_page:        '{Page}',
    detail_confidence:  '{Confidence}',
    detail_reasoning:   '{Reasoning}',
    detail_alternatives: '{Alternatives considered}',
    detail_source:      '{Source}',
    // MD export — deliberations
    md_page:            '{Page}',
    md_scope:           '{Scope}',
    md_confidence:      '{Confidence}',
    md_reasoning:       '{Reasoning}',
    md_alternatives:    '{Alternatives}',
    md_source:          '{Source}',
    // MD export — brief document
    md_brief_title:            '{Wireframe design choices}',
    md_brief_intro:            '{Design choices surfaced by the agent.}',
    // MD export — wireframes document (used by renderMarkdown)
    md_doc_title:              '{Wireframes}',
    md_page_label:             '{Page:}',
    md_purpose:                '{Purpose:}',
    md_section_inline:         '{Section}',
    md_narrative:              '{Narrative:}',
    md_question:               '{Question:}',
    md_goal:                   '{Goal:}',
    md_layout:                 '{Layout:}',
    md_trusted_by:             '{Trusted by:}',
    md_banner_prefix:          '{banner:}',
    md_design_choices:         '{Design choices}',
    md_page_design_choices:    '{Page design choices}',
    md_reasoning_inline:       '{Reasoning:}',
    md_alternatives_inline:    '{Alternatives:}',
    md_rejected_inline:        '{rejected:}',
    md_confidence_inline:      '{confidence:}',
    md_secondary_suffix:       '{secondary}',
    // Download filenames
    file_wfd_with_decisions: 'shell-with-decisions.html',
    file_brief:               'wireframe-decisions.md',
    // Bottom bar controls
    bar_audit:              '{Design choices}',
    bar_page:               '{Page:}',
    bar_section_notes:      '{Show annotations}',
    bar_design_choices:     '{Show design choices}',
    bar_download:           '{Download:}',
    bar_download_html:      '{Wireframe HTML}',
    bar_download_md:        '{Wireframe MD}',
    bar_download_html_title: '{Download the current state of the deliverable as a self-contained HTML file}',
    bar_download_md_title:   '{Download wireframe content as Markdown — all pages, sections, elements, and design choices}',
    bar_pin_toggle:          '{Show design decisions}',
  };
  // Merge deliverable overrides (e.g. Polish labels) over the English defaults.
  // Translation contract: the agent translates the bracketed {English} placeholders in
  // DEFAULT_LABELS into the project language at build time and writes them into
  // _data.labels. The template is language-agnostic — no translation tables live here.
  const LABELS = Object.assign({}, DEFAULT_LABELS, _data.labels || {});

  /* ===== UNIFIED-ENGINE-START — character-identical between wireframing and audit templates ===== */

  // Tiny interpolator: 'Filters · active: {n}' → tpl('filter_label_active', { n: 3 }) → 'Filters · active: 3'
  function tpl(key, vars) {
    const s = LABELS[key] != null ? LABELS[key] : key;
    if (!vars) return s;
    return s.replace(/\{(\w+)\}/g, (_m, k) => (vars[k] != null ? vars[k] : ''));
  }
  // Fill any static markup that advertises a LABELS key. Elements with
  // data-label-key="<key>" get their textContent replaced; data-label-aria-key
  // sets the aria-label attribute. Keeps the Back/Prev/Next buttons localizable
  // without re-rendering markup in JS.
  function applyStaticLabels(root) {
    (root || document).querySelectorAll('[data-label-key]').forEach(el => {
      const key = el.getAttribute('data-label-key');
      if (LABELS[key] == null) return;
      const prefix = el.getAttribute('data-label-prefix') || '';
      el.textContent = prefix + LABELS[key];
    });
    (root || document).querySelectorAll('[data-label-aria-key]').forEach(el => {
      const key = el.getAttribute('data-label-aria-key');
      if (LABELS[key] != null) el.setAttribute('aria-label', LABELS[key]);
    });
    (root || document).querySelectorAll('[data-label-title-key]').forEach(el => {
      const key = el.getAttribute('data-label-title-key');
      if (LABELS[key] != null) el.setAttribute('title', LABELS[key]);
    });
  }

  const CONF_MAP = {
    'high':   { label: LABELS.confidence_high,   cls: 'mc-badge--green' },
    'medium': { label: LABELS.confidence_medium,  cls: 'mc-badge--yellow' },
    'low':    { label: LABELS.confidence_low,     cls: 'mc-badge--red' },
  };
  function pill(map, key) {
    const m = map[key];
    if (!m) return `<span class="mc-badge">${key}</span>`;
    return `<span class="mc-badge ${m.cls}">${m.label}</span>`;
  }

  // Decision state removed — design choices are pure rationale, not approvable items.
  const NS = _data.namespace || 'wireframes-default';

  const panel = document.getElementById('shellLeftpanel');
  const panelToggle = document.getElementById('shellPanelToggle');
  // Title + count removed from header per UX cleanup — these are no-op stubs so
  // existing render code (which still sets text/visibility) doesn't need a sweep.
  const panelTitle = { textContent: '', style: {} };
  const panelCount = { textContent: '', style: {} };
  const panelBody = document.getElementById('shellLeftpanelBody');
  const panelHeader = document.getElementById('shellHeader');
  const panelFilterArea = document.getElementById('shellFilterArea');
  const backBtn = document.getElementById('shellBack');
  const pageSelect = document.getElementById('shellPageSelect');
  const navEl = document.getElementById('shellNav');
  const navPrevBtn = document.getElementById('shellNavPrev');
  const navNextBtn = document.getElementById('shellNavNext');
  const navCounter = document.getElementById('shellNavCounter');

  // Navigation state — sequence of visible list items captured when entering detail
  let navList = [];
  let navIndex = -1;

  let view = 'list'; // 'list' | 'detail'
  // Empty array = no filter on this axis. Non-empty = OR within axis. AND across axes.
  let activeFilter = { page: [], confidence: [] };
  let filterExpanded = false;

  // ---- Panel open/close ----
  function openPanel() {
    panel.classList.add('is-open');
    panel.setAttribute('aria-hidden', 'false');
    document.body.classList.add('shell-leftpanel-open');
    if (panelToggle) panelToggle.classList.add('is-active');
    try { localStorage.setItem(`${NS}-panel-open`, '1'); } catch (e) {}
  }
  function closePanel() {
    panel.classList.remove('is-open');
    panel.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('shell-leftpanel-open');
    if (panelToggle) panelToggle.classList.remove('is-active');
    try { localStorage.setItem(`${NS}-panel-open`, '0'); } catch (e) {}
  }
  function togglePanel() {
    if (panel.classList.contains('is-open')) closePanel(); else openPanel();
  }

  // ---- List mode render ----
  function renderList() {
    view = 'list';
    panelHeader.style.display = 'none';
    panelFilterArea.style.display = '';
    setActiveWireframeElement(null);
    document.body.classList.remove('shell-detail-open');

    // Filter axes: page, confidence
    const uniquePages = [...new Map(WIREFRAMES.map(wf => [wf.slug, wf.title])).entries()];
    const confCount = (val) => ALL_ENTRIES.filter(e => e.d.confidence === val).length;

    const pageChips = [
      { key: 'all', label: LABELS.category_all, count: TOTAL },
      ...uniquePages.map(([slug, title]) => ({ key: slug, label: title, count: ALL_ENTRIES.filter(e => e.pageSlug === slug).length })),
    ];
    const confidenceChips = [
      { key: 'all',    label: LABELS.category_all,      count: TOTAL },
      { key: 'high',   label: LABELS.confidence_high,   count: confCount('high') },
      { key: 'medium', label: LABELS.confidence_medium, count: confCount('medium') },
      { key: 'low',    label: LABELS.confidence_low,    count: confCount('low') },
    ];

    function chipsRow(label, dim, list) {
      const sel = activeFilter[dim];
      const html = list.map(c => {
        const isActive = c.key === 'all' ? sel.length === 0 : sel.includes(c.key);
        return `
          <button class="shell-chip${isActive ? ' is-active' : ''}" data-filter-dim="${dim}" data-filter="${c.key}" type="button">
            ${c.label}<span class="shell-chip-count">${c.count}</span>
          </button>
        `;
      }).join('');
      return `<div class="shell-filter-section"><div class="shell-filter-section__label">${label}</div><div class="shell-filter-section__chips">${html}</div></div>`;
    }

    const chipsHTML =
      chipsRow(LABELS.axis_page, 'page', pageChips) +
      chipsRow(LABELS.axis_confidence, 'confidence', confidenceChips);

    function renderItem(entry) {
      const { d, n, scope, pageSlug, pageTitle, sectionType } = entry;
      // Group header already signals page vs section scope; list item only
      // adds the section type when the item is section-scoped.
      const sectionSuffix = scope === 'section' && sectionType ? ` &middot; ${sectionType}` : '';
      return `
        <div class="shell-item" data-id="${d.id}" data-page="${pageSlug || ''}" data-scope="${scope}" data-confidence="${d.confidence}">
          <div class="shell-item__row">
            <span class="shell-item__n">#${n}</span>
            <span class="shell-item__labels">
              ${d.confidence !== 'high' ? pill(CONF_MAP, d.confidence) : ''}
            </span>
          </div>
          <h4 class="shell-item__title">${d.title || d.summary}</h4>
          <div class="shell-item__page-note"><strong>${LABELS.detail_page}:</strong> ${pageTitle}${sectionSuffix}</div>
        </div>
      `;
    }
    const sectionEntries = ALL_ENTRIES.filter(e => e.scope === 'section' || e.scope === 'element');
    const pageEntries    = ALL_ENTRIES.filter(e => e.scope === 'page' || e.scope === 'strategy');
    const sectionHTML = sectionEntries.map(renderItem).join('');
    const pageHTML    = pageEntries.map(renderItem).join('');

    const activeChipCount = Object.values(activeFilter).reduce((acc, arr) => acc + arr.length, 0);
    const filterLabel = activeChipCount === 0 ? LABELS.filter_label : tpl('filter_label_active', { n: activeChipCount });
    const clearBtn = activeChipCount > 0
      ? `<button class="shell-filter-clear" id="shellFilterClear" type="button">${LABELS.filter_clear}</button>`
      : '';
    panelFilterArea.innerHTML = `
      <div class="shell-filter-row">
        <button class="shell-filter-toggle${filterExpanded ? ' is-open' : ''}" id="shellFilterToggle" type="button">
          <span>${filterLabel}</span>
          <span class="shell-filter-toggle__icon">${filterExpanded ? '−' : '+'}</span>
        </button>
        ${clearBtn}
      </div>
      <div class="shell-leftpanel__filter${filterExpanded ? '' : ' is-collapsed'}" id="shellFilter">${chipsHTML}</div>
    `;
    const sectionGroupHTML = sectionEntries.length ? `
      <div class="shell-group" data-group="section">
        <h4 class="shell-group-header">${tpl('group_section_choices', { n: sectionEntries.length })}</h4>
        <div class="shell-list">${sectionHTML}</div>
      </div>
    ` : '';
    const pageGroupHTML = pageEntries.length ? `
      <div class="shell-group" data-group="page">
        <h4 class="shell-group-header">${tpl('group_page_choices', { n: pageEntries.length })}</h4>
        <div class="shell-list">${pageHTML}</div>
      </div>
    ` : '';
    panelBody.innerHTML = sectionGroupHTML + pageGroupHTML;

    applyFilter();
  }

  function matchesPage(item) {
    const sel = activeFilter.page;
    if (!sel.length) return true;
    return sel.includes(item.dataset.page);
  }
  function matchesConfidence(item) {
    const sel = activeFilter.confidence;
    if (!sel.length) return true;
    return sel.includes(item.dataset.confidence);
  }
  function applyFilter() {
    const items = panelBody.querySelectorAll('.shell-item');
    const groups = panelBody.querySelectorAll('.shell-group');
    items.forEach(item => {
      const visible = matchesPage(item) && matchesConfidence(item);
      item.classList.toggle('is-hidden', !visible);
    });
    groups.forEach(g => {
      const visibleItems = g.querySelectorAll('.shell-item:not(.is-hidden)');
      g.classList.toggle('is-hidden', visibleItems.length === 0);
    });
  }

  function setFilter(dim, key) {
    if (key === 'all') {
      activeFilter[dim] = [];
    } else {
      const arr = activeFilter[dim];
      const idx = arr.indexOf(key);
      if (idx === -1) arr.push(key);
      else arr.splice(idx, 1);
    }
    renderList();
  }

  // ---- Navigation sequence (prev/next within current filter) ----
  function captureNavList() {
    navList = Array.from(panelBody.querySelectorAll('.shell-item:not(.is-hidden)')).map(el => ({
      id: el.dataset.id,
      page: el.dataset.page || null,
    }));
  }
  function ensureNavContains(id) {
    const found = navList.findIndex(x => x.id === id);
    if (found === -1) {
      captureNavList();
      navIndex = navList.findIndex(x => x.id === id);
      if (navIndex === -1) {
        navList = ALL_ENTRIES.map(e => ({ id: e.d.id, page: e.pageSlug }));
        navIndex = navList.findIndex(x => x.id === id);
      }
    } else {
      navIndex = found;
    }
  }
  function updateNavCounter() {
    if (!navList.length) { navCounter.textContent = LABELS.nav_counter_empty; navPrevBtn.disabled = true; navNextBtn.disabled = true; return; }
    navCounter.textContent = tpl('nav_counter', { i: navIndex + 1, total: navList.length });
    navPrevBtn.disabled = navIndex <= 0;
    navNextBtn.disabled = navIndex >= navList.length - 1;
  }
  function goPrevItem() {
    if (navIndex > 0) {
      navIndex--;
      const x = navList[navIndex];
      renderDetail(x.id);
      goToDeliberation(x.id, x.page);
    }
  }
  function goNextItem() {
    if (navIndex < navList.length - 1) {
      navIndex++;
      const x = navList[navIndex];
      renderDetail(x.id);
      goToDeliberation(x.id, x.page);
    }
  }

  // ---- Detail mode render ----
  function renderDetail(id) {
    view = 'detail';
    panelHeader.style.display = '';
    panelFilterArea.style.display = 'none';
    panelFilterArea.innerHTML = '';
    backBtn.style.display = 'inline-block';
    navEl.style.display = 'flex';
    const entry = DELIB_MAP[id];
    if (!entry) return;
    const { d, scope, pageTitle, sectionType } = entry;
    backBtn.style.display = 'inline-block';
    setActiveWireframeElement(id);
    document.body.classList.add('shell-detail-open');

    // Scope is communicated by the group the item came from; detail panel
    // shows page + (when section-scoped) section type as a suffix on the
    // page row instead of a dedicated Scope row.
    const sectionSuffix = scope === 'section' && sectionType ? ` &middot; ${sectionType}` : '';
    const alternativesBlock = (d.alternatives && d.alternatives.length) ? `
      <div class="shell-detail__block">
        <h4 class="shell-detail__label">${LABELS.detail_alternatives}</h4>
        <ul class="shell-detail__text">${d.alternatives.map(a => `<li><strong>${a.desc}</strong> — ${a.rejected}</li>`).join('')}</ul>
      </div>
    ` : '';
    panelBody.innerHTML = `
      <h3 class="shell-detail__title">${d.title || d.summary}</h3>
      <dl class="shell-detail__meta">
        <dt>${LABELS.detail_page}</dt><dd>${pageTitle}${sectionSuffix}</dd>
        <dt>${LABELS.detail_confidence}</dt><dd>${pill(CONF_MAP, d.confidence)}</dd>
      </dl>
      <div class="shell-detail__blocks">
        <div class="shell-detail__block">
          <h4 class="shell-detail__label">${LABELS.detail_reasoning}</h4>
          <p class="shell-detail__text">${d.reasoning}</p>
        </div>
        ${alternativesBlock}
      </div>
    `;
    updateNavCounter();
  }

  // ---- Event wiring ----

  // Bottom bar — panel toggle
  if (panelToggle) panelToggle.addEventListener('click', togglePanel);

  // Bottom bar — page select drives .wf-page--active toggle + URL hash + nav re-render.
  if (pageSelect) {
    function activatePage(slug) {
      if (!slug) return;
      const wfPages = document.querySelectorAll('.wf-page');
      wfPages.forEach(p => p.classList.toggle('wf-page--active', p.id === slug));
      if (pageSelect.value !== slug) pageSelect.value = slug;
    }
    pageSelect.addEventListener('change', (e) => {
      const slug = e.target.value;
      activatePage(slug);
      location.hash = '#' + slug;
    });
    window.addEventListener('hashchange', () => {
      activatePage((location.hash || '').slice(1));
    });
    document.addEventListener('DOMContentLoaded', () => {
      const wfPages = document.querySelectorAll('.wf-page');
      const initial = (location.hash || '').slice(1) || (pageSelect.value || (wfPages[0] && wfPages[0].id));
      activatePage(initial);
    });
    const wfPagesNow = document.querySelectorAll('.wf-page');
    const initialNow = (location.hash || '').slice(1) || (pageSelect.value || (wfPagesNow[0] && wfPagesNow[0].id));
    activatePage(initialNow);
  }

  // Section-annotations toggle — hides/shows the gray .wf-note meta footer
  // under each wireframe section (Section/Narrative/Question/Goal band).
  const wfNotesToggle = document.getElementById('wfNotesToggle');
  if (wfNotesToggle) {
    let storedNotes = null;
    try { storedNotes = localStorage.getItem(`${NS}-wf-notes-visible`); } catch (e) {}
    const initialNotes = storedNotes === null ? true : storedNotes === '1';
    wfNotesToggle.checked = initialNotes;
    document.body.classList.toggle('wf-notes-hidden', !initialNotes);
    wfNotesToggle.addEventListener('change', (e) => {
      const show = e.target.checked;
      document.body.classList.toggle('wf-notes-hidden', !show);
      try { localStorage.setItem(`${NS}-wf-notes-visible`, show ? '1' : '0'); } catch (_e) {}
    });
  }

  // Design-choices toggle — hides/shows numbered pointer badges on sections.
  const shellBadgesToggle = document.getElementById('shellBadgesToggle');
  if (shellBadgesToggle) {
    let storedBadges = null;
    try { storedBadges = localStorage.getItem(`${NS}-shell-badges-visible`); } catch (e) {}
    const initialBadges = storedBadges === null ? true : storedBadges === '1';
    shellBadgesToggle.checked = initialBadges;
    document.body.classList.toggle('shell-badges-hidden', !initialBadges);
    shellBadgesToggle.addEventListener('change', (e) => {
      const show = e.target.checked;
      document.body.classList.toggle('shell-badges-hidden', !show);
      try { localStorage.setItem(`${NS}-shell-badges-visible`, show ? '1' : '0'); } catch (_e) {}
    });
  }

  // Scroll viewport to the section that contains the badge for deliberation `id`
  function scrollToBadge(id) {
    const el = document.querySelector(`[data-shell-id="${id}"]`);
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const top = window.scrollY + rect.top - 80;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  // Highlight the wireframe section linked to the currently-open deliberation.
  // Pass `null` to clear (on back-to-list or close).
  function setActiveWireframeElement(id) {
    document.querySelectorAll('[data-shell-id].is-shell-active')
      .forEach(el => el.classList.remove('is-shell-active'));
    if (id == null) return;
    const el = document.querySelector(`[data-shell-id="${id}"]`);
    if (el) el.classList.add('is-shell-active');
  }

  // Navigate to the page containing deliberation, then scroll to its badge
  function goToDeliberation(id, targetPage) {
    const currentHash = (location.hash || '').slice(1);
    if (targetPage && currentHash !== targetPage) {
      location.hash = '#' + targetPage;
      setTimeout(() => scrollToBadge(id), 120);
    } else {
      scrollToBadge(id);
    }
  }

  // Filter area — delegated clicks (filter toggle + chips, lives outside scrollable body)
  panelFilterArea.addEventListener('click', (e) => {
    const clearBtn = e.target.closest('#shellFilterClear');
    if (clearBtn) {
      activeFilter = { page: [], confidence: [] };
      renderList();
      return;
    }
    const filterToggle = e.target.closest('#shellFilterToggle');
    if (filterToggle) {
      filterExpanded = !filterExpanded;
      renderList();
      return;
    }
    const chip = e.target.closest('.shell-chip');
    if (chip) { setFilter(chip.dataset.filterDim || 'category', chip.dataset.filter); return; }
  });

  // Panel body — delegated clicks (list items + decision buttons)
  panelBody.addEventListener('click', (e) => {
    const filterToggle = e.target.closest('#shellFilterToggle');
    if (filterToggle) {
      filterExpanded = !filterExpanded;
      renderList();
      return;
    }
    const chip = e.target.closest('.shell-chip');
    if (chip) { setFilter(chip.dataset.filterDim || 'page', chip.dataset.filter); return; }
    const item = e.target.closest('.shell-item');
    if (item) {
      captureNavList();
      const id = item.dataset.id;
      navIndex = navList.findIndex(x => x.id === id);
      renderDetail(id);
      goToDeliberation(id, item.dataset.page);
      return;
    }
  });

  // Back button — detail → list
  backBtn.addEventListener('click', () => {
    if (view === 'detail') renderList();
  });

  // Badges on sections — open detail for that deliberation (delegated on shellPages)
  document.getElementById('shellPages').addEventListener('click', (e) => {
    const btn = e.target.closest('.shell-badge');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const id = btn.dataset.id;
    if (!id) return;
    openPanel();
    ensureNavContains(id);
    renderDetail(id);
  });

  // Prev/Next navigation buttons
  if (navPrevBtn) navPrevBtn.addEventListener('click', goPrevItem);
  if (navNextBtn) navNextBtn.addEventListener('click', goNextItem);

  // Keyboard — ESC closes
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && panel.classList.contains('is-open')) {
      if (view === 'detail') renderList();
      else closePanel();
    }
  });

  function triggerDownload(filename, text, mime) {
    const blob = new Blob([text], { type: (mime || 'text/plain') + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---- Wireframe-with-decisions export (full HTML + decisions MD) ----
  function deliberationMdSection(entry) {
    const { d, scope, pageTitle, sectionType } = entry;
    const scopeLabel = scope === 'page' ? 'page' : `section · ${sectionType}`;
    const lines = [
      `### ${d.id} — ${d.title || d.summary}`,
      '',
      `**${LABELS.md_page}:** \`${pageTitle}\`  `,
      `**${LABELS.md_scope}:** ${scopeLabel}  `,
      `**${LABELS.md_confidence}:** ${d.confidence}`,
      '',
      `**${LABELS.md_reasoning}:**`, '', d.reasoning,
    ];
    if (d.alternatives && d.alternatives.length) {
      lines.push('', `**${LABELS.md_alternatives}:**`);
      d.alternatives.forEach(a => lines.push(`- ${a.desc} — rejected: ${a.rejected}`));
    }
    if (d.inputSource) {
      lines.push('', `**${LABELS.md_source}:** ${d.inputSource.kind}:${d.inputSource.ref}`);
    }
    return lines.join('\n');
  }
  function generateDecisionsMd() {
    const parts = [
      `# ${LABELS.md_brief_title}`,
      '',
      LABELS.md_brief_intro,
      '',
      '---',
      '',
    ];
    ALL_ENTRIES.forEach(e => { parts.push(deliberationMdSection(e), '', '---', ''); });
    return parts.join('\n').replace(/\n+$/, '\n');
  }
  function buildHtmlWithDecisions() {
    const dataEl = document.getElementById('wireframes-findings-data');
    const payload = JSON.parse(dataEl.textContent);
    const docClone = document.documentElement.cloneNode(true);
    const cloneData = docClone.querySelector('#wireframes-findings-data');
    if (cloneData) cloneData.textContent = '\n' + JSON.stringify(payload, null, 2) + '\n';
    // Reset every container the IIFE populates at init — the data block is the
    // single source of truth and the renderers rebuild from it on reload.
    // Without this, IIFE-appenders (insertAdjacentHTML, appendChild) run on the
    // already-populated clone and produce 2× the entries on reload.
    ['shellPages', 'shellLeftpanelBody', 'shellFilterArea', 'shellPageSelect'].forEach(id => {
      const el = docClone.querySelector('#' + id);
      if (el) el.innerHTML = '';
    });
    return '<!DOCTYPE html>\n' + docClone.outerHTML;
  }
  function downloadWfdHtml() {
    const html = buildHtmlWithDecisions();
    const wfs = _data.wireframes || [];
    const ns = (_data.namespace || '').replace(/^ux-designer-wireframes-/, '').replace(/-\d{4}-\d{2}-\d{2}$/, '');
    const fileSlug = ns || (wfs[0] && wfs[0].slug) || 'wireframes';
    triggerDownload(`${fileSlug}-wireframes.html`, html, 'text/html');
  }
  function downloadDecisionsMd() {
    const md = generateDecisionsMd();
    triggerDownload(LABELS.file_brief, md, 'text/markdown');
  }
  const dlHtmlBtn = document.getElementById('shellDownloadHtml');
  if (dlHtmlBtn) dlHtmlBtn.addEventListener('click', downloadWfdHtml);
  const dlMdBtn = document.getElementById('shellDownloadMd');
  if (dlMdBtn) dlMdBtn.addEventListener('click', downloadWireframesMd);

  // Download visibility — per shared convention (interactive-deliverable-shell.md
  // §Download button convention). Hide buttons when target content isn't populated;
  // hide the entire group when no buttons are visible.
  const HTML_VISIBLE = WIREFRAMES.length > 0;
  const MD_VISIBLE = WIREFRAMES.length > 0;
  if (dlHtmlBtn && !HTML_VISIBLE) dlHtmlBtn.style.display = 'none';
  if (dlMdBtn && !MD_VISIBLE) dlMdBtn.style.display = 'none';
  const dlGroup = document.getElementById('shellDownloadGroup');
  if (dlGroup && !HTML_VISIBLE && !MD_VISIBLE) dlGroup.style.display = 'none';

  // ---- Wireframe content MD formatter ----
  // Renders _data as Markdown per the element → MD mapping in wireframing-schema.md §MD output.
  // Deliberations ARE included: schema §MD output example shows "### Design choices" block.
  // Contract: formatWireframesMd(data) → { md: string, filename: string }
  // See references/shared/interactive-deliverable-shell.md §MD export convention.
  function formatWireframesMd(data) {
    const wfs = data.wireframes || [];
    // Derive filename slug: strip "ux-designer-wireframes-" prefix and any date suffix from namespace.
    const ns = (data.namespace || '').replace(/^ux-designer-wireframes-/, '').replace(/-\d{4}-\d{2}-\d{2}$/, '');
    const fileSlug = ns || (wfs[0] && wfs[0].slug) || 'wireframes';

    // Frontmatter
    const today = new Date().toISOString().slice(0, 10);
    const projectName = ns || 'Project';
    const lines = [];
    lines.push('---');
    lines.push(`project: ${projectName}`);
    lines.push(`generated: ${today}`);
    lines.push('---');
    lines.push('');
    lines.push(`# ${LABELS.md_doc_title} — ${projectName}`);
    lines.push('');

    wfs.forEach(wf => {
      // Page boundary
      lines.push(`# ${LABELS.md_page_label} ${wf.title || wf.slug}`);
      lines.push(`${LABELS.md_purpose} ${wf.purpose || ''}`);
      lines.push('');

      (wf.sections || []).forEach(sec => {
        // Section boundary
        lines.push(`## ${LABELS.md_section_inline} — ${sec.type}`);
        lines.push(`${LABELS.md_section_inline}: ${sec.type}`);
        lines.push(`${LABELS.md_narrative} ${sec.narrative}`);
        lines.push(`${LABELS.md_question} ${sec.userQuestion}`);
        lines.push(`${LABELS.md_goal} ${sec.purpose}`);
        lines.push(`${LABELS.md_layout} ${sec.layout}`);
        lines.push('');

        // Elements — per schema §MD output mapping.
        // Container kinds (grid/card/accordion) are flattened — MD has no multi-column concept.
        const renderElementMd = (el) => {
          if (!el || !el.kind) return;
          switch (el.kind) {
            case 'heading': {
              const hashes = '#'.repeat(el.level || 1);
              lines.push(`${hashes} ${el.text}`);
              break;
            }
            case 'paragraph':
              lines.push(el.text);
              break;
            case 'cta': {
              // Deprecated alias — keep [CTA: ...] form for one release of MD-diff stability.
              const suffix = el.variant === 'secondary' ? ` (${LABELS.md_secondary_suffix})` : '';
              lines.push(`[CTA: ${el.label}]${suffix}`);
              break;
            }
            case 'button': {
              const suffix = el.variant === 'secondary' ? ` (${LABELS.md_secondary_suffix})` : '';
              lines.push(`[Button: ${el.label}]${suffix}`);
              break;
            }
            case 'link': {
              const suffix = el.variant === 'arrow' ? ' →' : '';
              lines.push(`[Link: ${el.label}${suffix}]`);
              break;
            }
            case 'media': {
              // height is a render-only hint, no MD representation.
              // decorative === true OR height === 'xs' suppresses label (matches HTML render path).
              const mediaLabelSuppressed = el.decorative === true || el.height === 'xs';
              if (mediaLabelSuppressed) {
                lines.push(`[Media]`);
              } else {
                lines.push(`[Media: ${el.label || el.description || ''}]`);
              }
              break;
            }
            case 'label':
              lines.push(`**${el.text}**`);
              break;
            case 'list': {
              (el.items || []).forEach((item, i) => {
                lines.push(el.ordered ? `${i + 1}. ${item}` : `- ${item}`);
              });
              break;
            }
            case 'field':
              lines.push(`[Field: ${el.name} (${el.fieldType})]`);
              break;
            case 'micro':
              lines.push(`_${el.text}_`);
              break;
            case 'stat': {
              lines.push(`**${el.value}** — ${el.label}`);
              if (el.detail) lines.push(el.detail);
              break;
            }
            case 'testimonial': {
              lines.push(`> ${el.quote}`);
              const role = el.role || '';
              const company = el.company || '';
              const roleCompany = role && company ? `${role} @ ${company}` : (role || company || '');
              const attribution = roleCompany ? `${el.author}, ${roleCompany}` : el.author;
              lines.push(`> — ${attribution}`);
              break;
            }
            case 'trust-bar': {
              const items = (el.items || []).map(item => {
                return typeof item === 'string' ? item : (item.label || item.description || '');
              });
              lines.push(`${LABELS.md_trusted_by} ${items.join(' · ')}`);
              break;
            }
            case 'banner': {
              lines.push(`> ${LABELS.md_banner_prefix} ${el.text}`);
              break;
            }
            case 'accordion': {
              (el.items || []).forEach(item => {
                lines.push(`### ${item.label}`);
                lines.push('');
                (item.body || []).forEach(child => renderElementMd(child));
              });
              break;
            }
            case 'grid': {
              // MD has no multi-column concept — flatten children in document order
              (el.children || []).forEach(child => renderElementMd(child));
              break;
            }
            case 'card': {
              // Card boundary as a separator before the children, except for the first card in a grid
              lines.push('--- card ---');
              (el.children || []).forEach(child => renderElementMd(child));
              break;
            }
            default: {
              // Extension fallback: emit fallbackMd verbatim, or [{kind}] placeholder
              if (el.fallbackMd) {
                lines.push(el.fallbackMd);
              } else if (Array.isArray(el.children)) {
                lines.push(`[${el.kind}]`);
                el.children.forEach(child => renderElementMd(child));
              } else {
                lines.push(`[${el.kind}]`);
              }
              break;
            }
          }
          lines.push('');
        };
        (sec.elements || []).forEach(el => renderElementMd(el));

        // Section compression — reverse-mode structured signal per schema §section entry.
        // Emits one human-readable line before deliberations (deliberations[] is empty in reverse-mode).
        const compression = sec.compression;
        if (compression && typeof compression === 'object') {
          const kind = compression.kind;
          const reason = compression.reason || '';
          const shown = compression.shown;
          const total = compression.total;
          let compLine = '';
          if (kind === 'row-density' && typeof shown === 'number' && typeof total === 'number') {
            compLine = `> _Compressed: ${shown} of ${total} items — ${reason}_`;
          } else if (kind === 'prose-paraphrase') {
            compLine = `> _Compressed (prose paraphrased) — ${reason}_`;
          } else if (kind === 'decoration-drop') {
            compLine = `> _Compressed (decoration dropped) — ${reason}_`;
          }
          if (compLine) {
            lines.push(compLine);
            lines.push('');
          }
        }

        // Section deliberations — included per schema §MD output example
        const sDelibsRaw = (sec.deliberations || []);
        if (sDelibsRaw.length) {
          lines.push(`### ${LABELS.md_design_choices}`);
          sDelibsRaw.forEach(d => {
            lines.push(`- ${d.title || d.summary} (${LABELS.md_confidence_inline} ${d.confidence})`);
            if (d.reasoning) lines.push(`  - ${LABELS.md_reasoning_inline} ${d.reasoning}`);
            (d.alternatives || []).forEach(alt => {
              lines.push(`  - ${LABELS.md_alternatives_inline} ${alt.desc} — ${LABELS.md_rejected_inline} ${alt.rejected}`);
            });
          });
          lines.push('');
        }
      });

      // Page deliberations
      const pDelibsRaw = (wf.pageDeliberations || []);
      if (pDelibsRaw.length) {
        lines.push(`### ${LABELS.md_page_design_choices}`);
        pDelibsRaw.forEach(d => {
          lines.push(`- ${d.title || d.summary} (${LABELS.md_confidence_inline} ${d.confidence})`);
          if (d.reasoning) lines.push(`  - ${LABELS.md_reasoning_inline} ${d.reasoning}`);
          (d.alternatives || []).forEach(alt => {
            lines.push(`  - ${LABELS.md_alternatives_inline} ${alt.desc} — ${LABELS.md_rejected_inline} ${alt.rejected}`);
          });
        });
        lines.push('');
      }
    });

    return { md: lines.join('\n'), filename: `${fileSlug}-wireframes.md` };
  }

  function downloadWireframesMd() {
    const { md, filename } = formatWireframesMd(_data);
    triggerDownload(filename, md, 'text/markdown');
  }

  // ---- Section + page rendering from JSON ----

  // renderElement(el) — returns HTML string for one element per schema mapping.
  // 3-line wrapper: if el.id is present, injects data-shell-element-id on the outermost
  // rendered tag so the post-render badge pass can attach a .shell-badge to it.
  function renderElement(el) {
    if (!el || typeof el.kind !== 'string') return '';
    const _rawHTML = _renderElementInner(el);   // line 1 of wrapper
    if (el.id && _rawHTML) {                     // line 2 of wrapper
      return _rawHTML.replace(/^(<[a-zA-Z][^>]*)>/, `$1 data-shell-element-id="${el.id}">`);
    }                                            // line 3 of wrapper
    return _rawHTML;
  }
  function _renderElementInner(el) {
    if (!el || typeof el.kind !== 'string') return '';
    switch (el.kind) {
      case 'heading':
        return `<h${el.level}>${el.text}</h${el.level}>`;
      case 'paragraph':
        return `<p>${el.text}</p>`;
      case 'cta':
        // Deprecated alias — routes to button renderer for one release of back-compat.
        // New content should use kind: 'button' directly.
        return renderElement({ kind: 'button', label: el.label, variant: el.variant, href: el.href });
      case 'button': {
        const variant = el.variant === 'secondary' ? 'secondary' : 'primary';
        if (el.href) {
          return `<a class="wf-button wf-button--${variant}" href="${el.href}">${el.label}</a>`;
        }
        return `<button class="wf-button wf-button--${variant}" type="button">${el.label}</button>`;
      }
      case 'link': {
        const variant = el.variant === 'arrow' ? 'arrow' : 'plain';
        const href = el.href || '#';
        return `<a class="wf-link wf-link--${variant}" href="${href}">${el.label}</a>`;
      }
      case 'media': {
        // Optional `height` field: xs | sm | md | lg | cover (default md). xs = 64px.
        // Optional `width`  field: xs | sm | md | lg (default: container-driven — no width class emitted).
        // Optional `decorative` boolean (reverse-mode): when true OR height === 'xs',
        // the placeholder renders without label text (the visual slot stays visible).
        const allowedHeights = ['xs', 'sm', 'md', 'lg', 'cover'];
        const allowedWidths = ['xs', 'sm', 'md', 'lg'];
        const height = allowedHeights.indexOf(el.height) >= 0 ? el.height : 'md';
        const width = allowedWidths.indexOf(el.width) >= 0 ? el.width : '';
        const widthClass = width ? ` wf-media--w-${width}` : '';
        const labelSuppressed = el.decorative === true || height === 'xs';
        const labelHTML = labelSuppressed ? '' : (el.label || '');
        return `<div class="wf-media wf-media--${height}${widthClass}">${labelHTML}</div>`;
      }
      case 'label':
        return `<div class="wf-label">${el.text}</div>`;
      case 'list': {
        const tag = el.ordered ? 'ol' : 'ul';
        const items = (el.items || []).map(i => `<li>${i}</li>`).join('');
        return `<${tag} class="wf-list">${items}</${tag}>`;
      }
      case 'field': {
        if (el.fieldType === 'textarea') return `<textarea class="wf-field" name="${el.name}" placeholder="${el.placeholder || ''}"></textarea>`;
        if (el.fieldType === 'select') return `<select class="wf-field" name="${el.name}"><option>${el.placeholder || 'Select…'}</option></select>`;
        return `<input class="wf-field" type="${el.fieldType || 'text'}" name="${el.name}" placeholder="${el.placeholder || ''}">`;
      }
      case 'micro':
        return `<em class="wf-micro">${el.text}</em>`;
      case 'stat': {
        const iconHTML = el.icon
          ? (typeof el.icon === 'string'
              ? `<div class="wf-stat__icon">${el.icon}</div>`
              : `<div class="wf-stat__icon">${el.icon.label || el.icon.description || ''}</div>`)
          : '';
        const detailHTML = el.detail ? `<div class="wf-stat__detail">${el.detail}</div>` : '';
        return `<div class="wf-stat">${iconHTML}<div class="wf-stat__value">${el.value}</div><div class="wf-stat__label">${el.label}</div>${detailHTML}</div>`;
      }
      case 'testimonial': {
        const ratingHTML = el.rating
          ? `<div class="wf-testimonial__rating">${'★'.repeat(Math.round(el.rating)) + '☆'.repeat(Math.max(0, 5 - Math.round(el.rating)))}</div>`
          : '';
        const photoHTML = el.photo
          ? `<div class="wf-testimonial__photo">${el.photo.label || el.photo.description || '[photo]'}</div>`
          : '';
        const role = el.role || '';
        const company = el.company || '';
        const roleCompany = role && company ? `${role} @ ${company}` : (role || company || '');
        const roleCompanyHTML = roleCompany ? `<div class="wf-testimonial__role-company">${roleCompany}</div>` : '';
        return `<div class="wf-testimonial">${ratingHTML}<blockquote class="wf-testimonial__quote">${el.quote}</blockquote><div class="wf-testimonial__attribution">${photoHTML}<div class="wf-testimonial__author-block"><div class="wf-testimonial__author">${el.author}</div>${roleCompanyHTML}</div></div></div>`;
      }
      case 'accordion': {
        const items = (el.items || []).map(item => {
          const isOpen = el.defaultOpen && item.label === el.defaultOpen ? ' open' : '';
          const bodyHTML = (item.body || []).map(child => renderElement(child)).join('\n');
          return `<details class="wf-accordion__item"${isOpen}><summary class="wf-accordion__summary">${item.label}</summary><div class="wf-accordion__body">${bodyHTML}</div></details>`;
        }).join('');
        return `<div class="wf-accordion">${items}</div>`;
      }
      case 'trust-bar': {
        const items = (el.items || []).map(item => {
          const text = typeof item === 'string' ? item : (item.label || item.description || '');
          return `<div class="wf-trust-bar__item">${text}</div>`;
        }).join('');
        return `<div class="wf-trust-bar">${items}</div>`;
      }
      case 'banner': {
        const closeHTML = el.dismissible ? '<button class="wf-banner__close" type="button" aria-label="Dismiss">×</button>' : '';
        return `<div class="wf-banner"><span>${el.text}</span>${closeHTML}</div>`;
      }
      case 'grid': {
        // Container kind — walks children, wraps in .wf-grid + column spec.
        // v4.3: columns may be an integer (2|3|4 → .wf-grid-N equal cols) OR an
        // array of positive numbers (inline style `grid-template-columns: Nfr Nfr ...`).
        // v4.4: columns may also be the string "auto" — intrinsic-width packing
        // (`grid-template-columns: auto auto ...` per children.length). Pair with
        // align: "center" to center the children-as-a-block (common pattern for
        // tight CTA pairs and compact social-proof strips).
        const childrenHTML = (el.children || []).map(child => renderElement(child)).join('\n');
        const gridAlignClass = el.align === 'center' ? ' wf-grid--align-center'
                             : el.align === 'right'  ? ' wf-grid--align-right'
                             : '';
        if (el.columns === 'auto') {
          const n = (el.children || []).length || 1;
          const template = Array(n).fill('auto').join(' ');
          return `<div class="wf-grid${gridAlignClass}" style="grid-template-columns: ${template};">${childrenHTML}</div>`;
        }
        if (Array.isArray(el.columns) && el.columns.every(n => typeof n === 'number' && n > 0)) {
          const template = el.columns.map(n => `${n}fr`).join(' ');
          return `<div class="wf-grid${gridAlignClass}" style="grid-template-columns: ${template};">${childrenHTML}</div>`;
        }
        const cols = (el.columns === 2 || el.columns === 3 || el.columns === 4) ? el.columns : 3;
        return `<div class="wf-grid wf-grid-${cols}${gridAlignClass}">${childrenHTML}</div>`;
      }
      case 'card': {
        // Container kind — walks children, wraps in .wf-card + optional variant class.
        // v4.3 variants:
        //   default (none)   → transparent, no padding — layout grouping (was `flush` in v4.2)
        //   "tile"           → warm fill + rounded + padding — visible bordered card on live page
        //   "highlight"      → accent border + main bg
        //   "flush"          → back-compat alias for v4.2 data; renders like default
        // v4.4: optional `align` field — left (default) | center | right.
        const variantClass = el.variant === 'tile'      ? ' wf-card--tile'
                           : el.variant === 'highlight' ? ' wf-card--highlight'
                           : el.variant === 'flush'     ? ' wf-card--flush'
                           : '';
        const cardAlignClass = el.align === 'center' ? ' wf-card--align-center'
                             : el.align === 'right'  ? ' wf-card--align-right'
                             : '';
        const childrenHTML = (el.children || []).map(child => renderElement(child)).join('\n');
        return `<div class="wf-card${variantClass}${cardAlignClass}">${childrenHTML}</div>`;
      }
      default:
        // Generic fallback for extension kinds.
        return renderExtensionElement(el);
    }
  }

  // renderExtensionElement(el) — generic fallback for unknown kinds (extension envelope).
  // Wraps element in .wf-ext .wf-ext--{kind} {className} and walks children OR renders fields
  // as a definition-list. customStyles (top-level data field) is injected at DOMContentLoaded
  // by injectCustomStyles() so authored CSS scoped to .wf-ext-* applies to the rendered output.
  function renderExtensionElement(el) {
    const kind = String(el.kind || 'unknown').replace(/[^a-zA-Z0-9_-]/g, '');
    const className = (typeof el.className === 'string' && /^wf-ext-/.test(el.className))
      ? el.className
      : `wf-ext-${kind}`;
    let bodyHTML = '';
    if (Array.isArray(el.children)) {
      bodyHTML = el.children.map(child => renderElement(child)).join('\n');
    } else if (el.fields && typeof el.fields === 'object') {
      bodyHTML = Object.entries(el.fields).map(([k, v]) => {
        return `<div class="wf-ext__field"><span class="wf-ext__field-key">${k}:</span><span>${typeof v === 'object' ? JSON.stringify(v) : String(v)}</span></div>`;
      }).join('');
    }
    return `<div class="wf-ext wf-ext--${kind} ${className}" data-kind="${kind}">${bodyHTML}</div>`;
  }

  // injectCustomStyles() — reads data.customStyles and injects a <style> tag at DOMContentLoaded.
  // Namespace guard: parses the rules and keeps only those whose selector starts with .wf-ext-
  // (or descends from one). Prevents extension CSS from leaking into core .wf-* classes.
  function injectCustomStyles() {
    const css = (_data && typeof _data.customStyles === 'string') ? _data.customStyles.trim() : '';
    if (!css) return;
    // Coarse selector-prefix scrub: split on closing braces, keep rules whose first selector
    // matches .wf-ext-... (allows descendant combinators inside the selector).
    const ruleBlocks = css.split('}').map(b => b.trim()).filter(Boolean);
    const safeRules = ruleBlocks.filter(block => {
      const openIdx = block.indexOf('{');
      if (openIdx < 0) return false;
      const selectorList = block.slice(0, openIdx);
      // Each selector in the list must start with .wf-ext- (after optional whitespace)
      return selectorList.split(',').every(sel => /^\s*\.wf-ext-/.test(sel));
    });
    if (!safeRules.length) return;
    const styleEl = document.createElement('style');
    styleEl.setAttribute('data-source', 'wireframes-customStyles');
    styleEl.textContent = safeRules.map(r => r + '}').join('\n');
    document.head.appendChild(styleEl);
  }

  // renderSection(section, sectionDeliberationIds) — returns HTML for one <section class="wf-section">
  function renderSection(section, deliberationIds) {
    const elementsHTML = (section.elements || []).map(el => renderElement(el)).join('\n');
    // Numbered badge buttons for deliberations attached to this section
    const badgesHTML = (deliberationIds || []).map(id => {
      const n = DELIB_MAP[id] ? DELIB_MAP[id].n : '?';
      return `<button class="shell-badge" data-id="${id}" aria-label="{Design choice} ${id}" type="button">${n}</button>`;
    }).join('');
    // data-shell-id for the first deliberation — used by setActiveWireframeElement
    const firstId = (deliberationIds && deliberationIds.length) ? deliberationIds[0] : null;
    const shellAttr = firstId ? ` data-shell-id="${firstId}"` : '';
    // Labels in the template source are wrapped in {} as a translation discovery marker.
    // The meta strip owns its own bracketing, so strip the label wrapper
    // before rendering. If the value is itself a placeholder ({foo}), merge label + value
    // into a single outer bracket pair; real values render plainly without brackets.
    const metaSeg = (label, value) => {
      const v = value == null ? '' : String(value);
      const lbl = label.startsWith('{') && label.endsWith('}') ? label.slice(1, -1) : label;
      if (v.startsWith('{') && v.endsWith('}')) {
        return `<span class="wf-note__seg">{<strong>${lbl}</strong> ${v.slice(1, -1)}}</span>`;
      }
      return `<span class="wf-note__seg"><strong>${lbl}</strong> ${v}</span>`;
    };
    // v4.4 align field — section-level alignment (left default, center, right).
    const sectionAlignClass = section.align === 'center' ? ' wf-section--align-center'
                            : section.align === 'right'  ? ' wf-section--align-right'
                            : '';
    return `
      <section class="wf-section wf-section--with-note-inside${sectionAlignClass}"${shellAttr}>
        ${badgesHTML}
        <div class="wf-inner">
          ${elementsHTML}
          <div class="wf-note wf-note--meta wf-note--meta-boxed">
            <div class="wf-note__row">
              ${metaSeg(LABELS.meta_section, section.type)}
              ${metaSeg(LABELS.meta_narrative, section.narrative)}
              ${metaSeg(LABELS.meta_question, section.userQuestion)}
              ${metaSeg(LABELS.meta_goal, section.purpose)}
            </div>
          </div>
        </div>
      </section>
    `;
  }

  // renderChromeNav(navObj) — returns HTML string for site nav
  function renderChromeNav(navObj) {
    if (!navObj) return '';
    const brandHTML = navObj.brand ? `<span class="wf-nav__logo">${navObj.brand.text || ''}</span>` : '';
    const linksHTML = (navObj.links || []).map(l => `<span class="wf-nav__label">${l.text}</span>`).join('');
    const ctaHTML = navObj.cta ? `<button class="wf-button wf-button--${navObj.cta.variant || 'primary'}" type="button">${navObj.cta.label}</button>` : '';
    return `${brandHTML}<div class="wf-nav__links">${linksHTML}</div>${ctaHTML}`;
  }

  // renderChromeFooter(footerObj) — returns HTML string for site footer
  function renderChromeFooter(footerObj) {
    if (!footerObj) return '';
    const colsHTML = (footerObj.columns || []).map(col => {
      const linksHTML = (col.links || []).map(l => `<span class="wf-nav__label" style="display:block;margin:4px 0;">${l.text}</span>`).join('');
      return `<div style="margin-right:32px;"><strong>${col.title}</strong>${linksHTML}</div>`;
    }).join('');
    const legal = footerObj.legal ? `<div style="margin-top:16px;color:#888;font-size:0.8em;">${footerObj.legal}</div>` : '';
    return `<div style="display:flex;flex-wrap:wrap;">${colsHTML}</div>${legal}`;
  }

  // renderWireframePage(wireframe) — builds full .wf-page div (nav + sections + footer)
  function renderWireframePage(wireframe) {
    const resolvedNav    = wireframe.navOverride    != null ? wireframe.navOverride    : CHROME.nav;
    const resolvedFooter = wireframe.footerOverride != null ? wireframe.footerOverride : CHROME.footer;
    const sectionsHTML = (wireframe.sections || []).map((sec, si) => {
      const deliberationIds = (sec.deliberations || []).map(d => d.id);
      return renderSection(sec, deliberationIds);
    }).join('');
    return `
      <div class="wf-page" id="${wireframe.slug}">
        <nav class="wf-nav">${renderChromeNav(resolvedNav)}</nav>
        ${sectionsHTML}
        <footer class="wf-footer">
          ${renderChromeFooter(resolvedFooter)}
        </footer>
      </div>
    `;
  }

  /* ===== UNIFIED-ENGINE-END ===== */

  // ---- Inject scoped CSS for extension kinds before pages render ----
  injectCustomStyles();

  // ---- Populate page switcher options + render all wireframe pages ----
  const pagesContainer = document.getElementById('shellPages');
  if (pagesContainer && pageSelect) {
    WIREFRAMES.forEach((wf, idx) => {
      // Page switcher option
      const opt = document.createElement('option');
      opt.value = wf.slug;
      opt.textContent = wf.title;
      pageSelect.appendChild(opt);
      // Render page HTML
      pagesContainer.insertAdjacentHTML('beforeend', renderWireframePage(wf));
    });
    // Activate first page
    const firstSlug = WIREFRAMES[0] && WIREFRAMES[0].slug;
    if (firstSlug) {
      document.querySelectorAll('.wf-page').forEach((p, i) => p.classList.toggle('wf-page--active', i === 0));
      pageSelect.value = firstSlug;
    }
  }

  // Initial state
  applyStaticLabels();
  const _btnCountEl = document.querySelector('#shellPanelToggle .shell-bottombar__btn-count');
  if (_btnCountEl) _btnCountEl.textContent = TOTAL;

  // Data-presence-driven UI.
  //
  // Forward wireframing populates pageDeliberations[] + section.deliberations[];
  // reverse wireframing leaves them empty and populates optional sourceUrl /
  // extractionMode / capturedAt fields instead. The template branches on data
  // presence — no explicit mode flag. See wireframing-schema.md §Mode detection.

  // Deliberations panel — hide the toggle button + badges checkbox when no
  // deliberations exist. Keeps the bottom bar uncluttered in reverse mode.
  if (TOTAL === 0) {
    const panelToggleEl = document.getElementById('shellPanelToggle');
    if (panelToggleEl) panelToggleEl.style.display = 'none';
    const badgesToggleLabel = document.querySelector('label.shell-bottombar__check:has(#shellBadgesToggle)');
    if (badgesToggleLabel) badgesToggleLabel.style.display = 'none';
    document.body.classList.remove('shell-leftpanel-open');
    const leftpanelEl = document.getElementById('shellLeftpanel');
    if (leftpanelEl) leftpanelEl.classList.remove('is-open');
  }

  // Snapshot-info label — rendered when at least one wireframes[] entry has
  // sourceUrl populated (reverse-mode indicator). Shown centered inside the
  // bottom bar's flex spacer — between the left-group controls and the
  // right-group Save/Download buttons. Hidden entirely when no sourceUrl.
  const _snapshotEntries = WIREFRAMES.filter(wf => wf.sourceUrl);
  if (_snapshotEntries.length > 0) {
    const spacer = document.querySelector('.shell-bottombar__spacer');
    if (spacer) {
      spacer.style.display = 'flex';
      spacer.style.justifyContent = 'center';
      spacer.style.alignItems = 'center';
      const labelText = LABELS.snapshot_info || '{Snapshot of existing site}';
      const span = document.createElement('span');
      span.className = 'shell-bottombar__snapshot-info';
      span.setAttribute('style',
        'color:#523a08;font-size:12px;font-family:var(--wf-font);' +
        'background:#fff3cd;border:1px solid #e0c860;border-radius:4px;' +
        'padding:4px 10px;white-space:nowrap;'
      );
      span.textContent = labelText.replace(/[{}]/g, '');
      spacer.appendChild(span);
    }
  }

  // ELEMENT-PIN HOOK: attach .shell-badge to each rendered element that has a
  // matching element-scope deliberation. Runs after all pages are in the DOM.
  ALL_ENTRIES.filter(e => e.scope === 'element').forEach(entry => {
    const slug   = entry.d.attached_to;
    const n      = entry.n;
    const id     = entry.d.id;
    const target = pagesContainer
      ? pagesContainer.querySelector('[data-shell-element-id="' + slug + '"]')
      : null;
    if (!target) return;
    // Make target a positioning context for the badge (mirrors section badge pattern)
    if (getComputedStyle(target).position === 'static') target.style.position = 'relative';
    const badge = document.createElement('button');
    badge.className   = 'shell-badge';
    badge.dataset.id  = id;
    badge.setAttribute('aria-label', '{Design choice} ' + id);
    badge.type        = 'button';
    badge.textContent = String(n);
    target.appendChild(badge);
  });

  renderList();
  let initialOpen = null;
  try { initialOpen = localStorage.getItem(`${NS}-panel-open`); } catch (e) {}
  if (initialOpen === '1' && TOTAL > 0) openPanel();
})();
</script>


</body>
